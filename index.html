<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Club | Oficial Store</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Iconos ---
        const ShoppingBag = () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>;
        const ArrowLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>;
        const X = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;

        // --- DATOS DE PRODUCTOS ---
        // IMPORTANTE: Para que funcione, coloca las fotos en la misma carpeta que este HTML
        const footballProducts = [
            { id: 1, name: 'Pantalones Urban', price: 29.99, category: 'Más Vendidos', img: 'pantalones.jpg' },
            { id: 2, name: 'Camiseta PSG', price: 95.00, category: 'Más Vendidos', img: 'camiseta_psg.jpeg' },
        ];

        const gymProducts = [
            { id: 201, name: 'Zapatillas Metcon', price: 139.00, category: 'Zapatillas', img: 'metcon.jpg' },
            { id: 202, name: 'Sudadera Gym', price: 45.00, category: 'Más Vendidos', img: 'sudadera.jpg' },
        ];

        const App = () => {
            const [view, setView] = useState('landing');
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [showForm, setShowForm] = useState(false);
            const [formData, setFormData] = useState({ nombre: '', direccion: '' });

            const addToCart = (product) => {
                const talla = prompt("Indica la talla:", "M");
                if(talla) {
                    setCart([...cart, { ...product, tallaSelected: talla }]);
                    setIsCartOpen(true);
                }
            };

            const cartTotal = cart.reduce((sum, item) => sum + item.price, 0);

            const copyOrder = () => {
                let text = `🚀 NUEVO PEDIDO - URBAN CLUB\n---------------------------\n`;
                text += `👤 CLIENTE: ${formData.nombre}\n📍 ENVÍO: ${formData.direccion}\n---------------------------\n`;
                cart.forEach((item, i) => {
                    text += `${i+1}. ${item.name} | Talla: ${item.tallaSelected} | ${item.price.toFixed(2)}€\n`;
                });
                text += `---------------------------\n💰 TOTAL: ${cartTotal.toFixed(2)}€`;

                navigator.clipboard.writeText(text).then(() => {
                    alert("✅ Pedido copiado. ¡Pégalo en WhatsApp!");
                });
            };

            if (view === 'landing') {
                return (
                    <div className="flex flex-col md:flex-row h-screen w-full overflow-hidden bg-black">
                        <div onClick={() => setView('futbol')} className="relative w-full md:w-1/2 h-1/2 md:h-full group cursor-pointer overflow-hidden">
                            <div className="absolute inset-0 bg-blue-900/40 z-10 transition-colors group-hover:bg-blue-900/20"></div>
                            <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&w=1000')] bg-cover bg-center"></div>
                            <h2 className="relative z-20 h-full flex items-center justify-center text-white text-5xl font-black italic uppercase">Todo Fútbol</h2>
                        </div>
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-30 bg-white text-black px-8 py-2 font-black text-2xl uppercase skew-x-[-10deg] hidden md:block">Urban Club</div>
                        <div onClick={() => setView('gym')} className="relative w-full md:w-1/2 h-1/2 md:h-full group cursor-pointer overflow-hidden">
                            <div className="absolute inset-0 bg-zinc-900/60 z-10 transition-colors group-hover:bg-zinc-900/40"></div>
                            <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=1000')] bg-cover bg-center"></div>
                            <h2 className="relative z-20 h-full flex items-center justify-center text-white text-5xl font-black italic uppercase">Todo Gym</h2>
                        </div>
                    </div>
                );
            }

            const products = view === 'futbol' ? footballProducts : gymProducts;

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    <nav className="sticky top-0 z-40 px-6 py-4 flex justify-between items-center bg-white border-b shadow-sm">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setView('landing')} className="p-2 hover:bg-gray-100 rounded-full"><ArrowLeft /></button>
                            <span className="font-black text-xl italic uppercase">Urban Club</span>
                        </div>
                        <button onClick={() => setIsCartOpen(true)} className="relative p-3 bg-black text-white rounded-full">
                            <ShoppingBag />
                            {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-red-600 text-[10px] w-5 h-5 flex items-center justify-center rounded-full border-2 border-white font-bold">{cart.length}</span>}
                        </button>
                    </nav>

                    <header className="px-6 py-10 bg-white text-center">
                        <h2 className="text-4xl font-black uppercase italic mb-6">{view === 'futbol' ? 'Fútbol' : 'Gym'}</h2>
                        <div className="flex justify-center gap-2">
                            {['Más Vendidos', 'Zapatillas'].map(cat => (
                                <button key={cat} className="px-4 py-2 border-2 border-black font-black text-[10px] uppercase hover:bg-black hover:text-white transition-all">{cat}</button>
                            ))}
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-6 py-12 flex-1 w-full">
                        <div className="grid grid-cols-2 lg:grid-cols-4 gap-8">
                            {products.map((p) => (
                                <div key={p.id} className="group bg-white p-4 border hover:shadow-xl transition-all relative">
                                    <div className="aspect-square bg-gray-100 mb-4 relative overflow-hidden flex items-center justify-center">
                                        {/* CORRECCIÓN AQUÍ: Uso de etiqueta img */}
                                        <img 
                                            src={p.img} 
                                            alt={p.name} 
                                            className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                                            onError={(e) => { e.target.src = 'https://via.placeholder.com/400?text=No+Imagen'; }}
                                        />
                                        <button 
                                            onClick={() => addToCart(p)}
                                            className="absolute inset-x-0 bottom-0 bg-black text-white py-4 translate-y-full group-hover:translate-y-0 transition-transform font-black text-[10px] uppercase tracking-widest"
                                        >
                                            + Seleccionar Talla
                                        </button>
                                    </div>
                                    <p className="text-[10px] font-black text-gray-400 uppercase mb-1">{p.category}</p>
                                    <h3 className="font-bold text-sm mb-2">{p.name}</h3>
                                    <p className="font-black text-xl">{p.price.toFixed(2)}€</p>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* Carrito */}
                    {isCartOpen && (
                        <>
                            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50" onClick={() => {setIsCartOpen(false); setShowForm(false);}}></div>
                            <div className="fixed top-0 right-0 h-full w-full max-w-md bg-white z-[60] shadow-2xl flex flex-col p-8 transition-all">
                                <div className="flex justify-between items-center mb-8 border-b-4 border-black pb-4">
                                    <h2 className="text-2xl font-black uppercase italic">Tu Pedido</h2>
                                    <button onClick={() => {setIsCartOpen(false); setShowForm(false);}}><X /></button>
                                </div>

                                <div className="flex-1 overflow-y-auto space-y-4 no-scrollbar">
                                    {cart.length === 0 ? <p className="text-center opacity-30 font-black uppercase py-10">Vacío</p> : 
                                        cart.map((item, idx) => (
                                            <div key={idx} className="flex gap-4 items-center border-b pb-4">
                                                <img src={item.img} className="w-16 h-16 object-cover bg-gray-100" />
                                                <div className="flex-1">
                                                    <h4 className="font-black text-[10px] uppercase">{item.name}</h4>
                                                    <p className="text-xs font-bold text-blue-600">Talla: {item.tallaSelected}</p>
                                                    <p className="font-black">{item.price.toFixed(2)}€</p>
                                                </div>
                                            </div>
                                        ))
                                    }
                                </div>

                                {cart.length > 0 && (
                                    <div className="pt-6 border-t-4 border-black mt-4">
                                        {!showForm ? (
                                            <button onClick={() => setShowForm(true)} className="w-full bg-black text-white py-5 font-black uppercase tracking-widest hover:bg-zinc-800">Tramitar Pedido</button>
                                        ) : (
                                            <div className="space-y-4">
                                                <input type="text" placeholder="Nombre y Apellidos" className="w-full p-4 border-2 border-black font-bold text-sm" onChange={(e) => setFormData({...formData, nombre: e.target.value})} />
                                                <textarea placeholder="Dirección y Teléfono" className="w-full p-4 border-2 border-black font-bold text-sm h-24" onChange={(e) => setFormData({...formData, direccion: e.target.value})}></textarea>
                                                <button onClick={copyOrder} disabled={!formData.nombre || !formData.direccion} className="w-full bg-green-600 text-white py-5 font-black uppercase tracking-widest disabled:opacity-30">Copiar Pedido para WhatsApp</button>
                                                <button onClick={() => setShowForm(false)} className="w-full text-[10px] font-black uppercase text-gray-400">Atrás</button>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
